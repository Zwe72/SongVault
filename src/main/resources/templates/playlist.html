<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Playlist</title>
</head>
<body>

<h1 th:text="${playlist.name}"></h1>

<p th:if="${playlist.user != null}">
    Owner: <span th:text="${playlist.user.username}"></span>
</p>

<p th:if="${#lists.isEmpty(playlist.songs)}">No songs in playlist.</p>

<table th:if="${not #lists.isEmpty(playlist.songs)}">
    <tr>
        <th>Title</th>
        <th>Artist</th>
        <th>Genre</th>
        <th>Year</th>
    </tr>

    <tr th:each="song : ${playlist.songs}">
        <td th:text="${song.title}"></td>
        <td th:text="${song.artist}"></td>
        <td th:text="${song.genre}"></td>
        <td th:text="${song.year}"></td>
        <td> <form th:action="@{/playlist/remove/{pid}/{sid}(pid=${playlist.id}, sid=${song.id})}" method="post">
        <button type="submit">Remove</button>
        </form> </td>
    </tr>
</table>

<p>
    <a th:href="@{/songlist}">Back</a>
</p>

</body>
</html>
