<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SongVault</title>
    <meta charset="UTF-8">
</head>
<body>

    <h1>Song List</h1>

    <form th:action="@{/songlist}" method="get">
        <input type="text" name="keyword" placeholder="Search songs...">
        <button type="submit">Filter</button>
    </form>

     <p>
        <a th:href="@{/addsong}">Add new song</a>
    </p>

    <p th:if="${#lists.isEmpty(songs)}">No songs added yet.</p>

    <table th:if="${not #lists.isEmpty(songs)}">
        <tr>
            <th>Title</th>
            <th>Artist</th>
            <th>Genre</th>
            <th>Year</th>
            <th>Added</th>
            <th></th>
        </tr>

        <tr th:each="song : ${songs}">
            <td th:text="${song.title}"></td>
            <td th:text="${song.artist}"></td>
            <td th:text="${song.genre}"></td>
            <td th:text="${song.year}"></td>
            <td th:text="${song.addedDate}"></td>
            <td><a th:href="@{/editsong/{id}(id=${song.id})}">Edit</a></td>
            <td>
            <form th:action="@{/deletesong/{id}(id=${song.id})}" method="post"
            onsubmit="return confirm('Are you sure you want to delete this song?')">
            <button type="submit">Delete</button>
            </form>
        </td>
        </tr>
    </table>

    <form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
    </form>
</body>
</html>
