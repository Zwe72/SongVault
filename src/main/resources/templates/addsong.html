<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Song</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Add New Song</h1>

<form th:action="@{/savesong}" th:object="${song}" method="post">
    <div>
        <label for="title">Title</label>
        <input type="text" id="title" th:field="*{title}">
    </div>
    <div>
        <label for="artist">Artist</label>
        <input type="text" id="artist" th:field="*{artist}">
    </div>
    <div>
        <label for="genre">Genre</label>
        <input type="text" id="genre" th:field="*{genre}">
    </div>
    <div>
        <label for="year">Year</label>
        <input type="text" id="year" th:field="*{year}">
    </div>

    <div>
        <button type="submit">Save</button>
    </div>
</form>

<p>
    <a th:href="@{/songlist}">Back to song list</a>
</p>

</body>
</html>
